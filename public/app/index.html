<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Weather Lookup</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    label { display: block; margin: 8px 0; }
    table { border-collapse: collapse; margin-top: 12px; width: 100%; max-width: 820px; }
    th, td { border: 1px solid #ccc; padding: 6px 8px; text-align: left; }
  </style>
</head>
<body>
  <h1>Weather Lookup</h1>

  <form id="f">
    <label>
      City
      <input id="city" required placeholder="Toronto" />
    </label>

    <label>
      Temperature units
      <select id="units">
        <option value="c" selected>C</option>
        <option value="f">F</option>
      </select>
    </label>

    <label>
      Days
      <select id="days">
        <option value="1">1</option>
        <option value="3" selected>3</option>
        <option value="7">7</option>
      </select>
    </label>

    <label>
      Wind unit
      <select id="windUnit">
        <option value="kmh" selected>kmh</option>
        <option value="mph">mph</option>
      </select>
    </label>

    <label>
      <input id="precip" type="checkbox" checked />
      Include precipitation
    </label>

    <label>
      <input id="wind" type="checkbox" checked />
      Include wind max
    </label>

    <button type="submit">Get weather</button>
  </form>

  <p id="status"></p>

  <table id="t" hidden>
    <thead>
      <tr>
        <th>Date</th>
        <th>Max temp</th>
        <th>Min temp</th>
        <th>Precip</th>
        <th>Wind max</th>
      </tr>
    </thead>
    <tbody id="tb"></tbody>
  </table>

  <script>
    const f = document.getElementById("f");
    const status = document.getElementById("status");
    const table = document.getElementById("t");
    const tbody = document.getElementById("tb");

    function showRows(daily, showPrecip, showWind) {
      tbody.innerHTML = "";
      const n = daily.time.length;

      for (let i = 0; i < n; i++) {
        const tr = document.createElement("tr");

        const tdDate = document.createElement("td");
        tdDate.textContent = daily.time[i];

        const tdMax = document.createElement("td");
        tdMax.textContent = daily.tmax[i];

        const tdMin = document.createElement("td");
        tdMin.textContent = daily.tmin[i];

        const tdPre = document.createElement("td");
        tdPre.textContent = showPrecip ? daily.precip[i] : "";

        const tdWind = document.createElement("td");
        tdWind.textContent = showWind ? daily.windMax[i] : "";

        tr.appendChild(tdDate);
        tr.appendChild(tdMax);
        tr.appendChild(tdMin);
        tr.appendChild(tdPre);
        tr.appendChild(tdWind);
        tbody.appendChild(tr);
      }

      table.hidden = false;
    }

    f.addEventListener("submit", async (e) => {
      e.preventDefault();
      status.textContent = "Loading...";
      table.hidden = true;

      const payload = {
        city: document.getElementById("city").value.trim(),
        units: document.getElementById("units").value,
        days: Number(document.getElementById("days").value),
        windUnit: document.getElementById("windUnit").value,
        includePrecip: document.getElementById("precip").checked,
        includeWind: document.getElementById("wind").checked
      };

      try {
        const r = await fetch("/api/weather", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await r.json();
        if (!r.ok) throw new Error(data.error || "Request failed");

        const offsetHours = data.timezone.offset / 3600;

        status.textContent =
          `Location: ${data.location.name}, ${data.location.country} | ` +
          `Temp: ${data.units.temperature} | Wind: ${data.units.wind} | ` +
          `Timezone: ${data.timezone.name} (UTC ${offsetHours >= 0 ? "+" : ""}${offsetHours})`;

        showRows(data.daily, data.includePrecip, data.includeWind);
      } catch (err) {
        status.textContent = err.message || String(err);
      }
    });
  </script>
</body>
</html>
